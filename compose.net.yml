# net-user-pl — the virtual internet: DNS (docker aliases), a local CA, a TLS
# reverse proxy, and citizen-facing sites (bank, gov), plus the SMS carrier and
# the URI event bus. Everything is offline and isolated on the `netpl` network.
#
# Bring the CA up to date first:  bash ca/gen.sh
services:
  eventbus:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./eventbus:/app:ro
      - eventbus_data:/data
    command: python app.py
    networks: [netpl]
    ports:
      - "${EVENTBUS_PORT:-28800}:9800"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:9800/health')"]
      interval: 5s
      timeout: 3s
      retries: 20

  sms-gateway:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./sms-gateway:/app:ro
      - ./twinlib.py:/opt/twin/twinlib.py:ro
    command: python app.py
    networks: [netpl]
    depends_on: [eventbus]

  bank:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./sites/bank:/app:ro
      - ./twinlib.py:/opt/twin/twinlib.py:ro
    command: python app.py
    networks: [netpl]
    depends_on: [eventbus, sms-gateway]

  gov:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./sites/gov:/app:ro
      - ./twinlib.py:/opt/twin/twinlib.py:ro
    command: python app.py
    networks: [netpl]
    depends_on: [eventbus]

  shop:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./sites/shop:/app:ro
      - ./twinlib.py:/opt/twin/twinlib.py:ro
    command: python app.py
    networks: [netpl]
    depends_on: [eventbus]

  p24:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./sites/p24:/app:ro
      - ./twinlib.py:/opt/twin/twinlib.py:ro
    command: python app.py
    networks: [netpl]
    depends_on: [eventbus, sms-gateway]

  # one server, many branded mock sites (facebook.com, youtube.com, allegro.pl…),
  # routed by Host header from brands.json. See sites/webmock/build.py.
  webmock:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./sites/webmock:/app:ro
      - ./twinlib.py:/opt/twin/twinlib.py:ro
    command: python app.py
    networks: [netpl]
    depends_on: [eventbus]

  proxy:
    image: caddy:latest
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./proxy/mocks.caddy:/etc/caddy/mocks.caddy:ro
      - ./ca/out:/certs:ro
    networks:
      netpl:
        # docker embedded DNS = the virtual internet's DNS: these names resolve
        # to the proxy, which terminates TLS with the local CA's leaf certs.
        # The mock-brand aliases below are generated by sites/webmock/build.py.
        aliases:
          - mbank.pl
          - www.mbank.pl
          - phone.jan.pl
          - login.gov.pl
          - poczta.jan.pl
          # --- webmock brands (generated) ---
          - facebook.com
          - www.facebook.com
          - instagram.com
          - www.instagram.com
          - x.com
          - www.x.com
          - linkedin.com
          - www.linkedin.com
          - reddit.com
          - www.reddit.com
          - tiktok.com
          - www.tiktok.com
          - youtube.com
          - www.youtube.com
          - netflix.com
          - www.netflix.com
          - spotify.com
          - www.spotify.com
          - google.com
          - www.google.com
          - gmail.com
          - www.gmail.com
          - wikipedia.org
          - www.wikipedia.org
          - github.com
          - www.github.com
          - stackoverflow.com
          - www.stackoverflow.com
          - amazon.pl
          - www.amazon.pl
          - allegro.pl
          - www.allegro.pl
          - olx.pl
          - www.olx.pl
          - wp.pl
          - www.wp.pl
          - onet.pl
          - www.onet.pl
          - discord.com
          - www.discord.com
          - whatsapp.com
          - www.whatsapp.com
          - telegram.org
          - www.telegram.org
          - airbnb.com
          - www.airbnb.com
          - booking.com
          - www.booking.com
          - pekao.pl
          - www.pekao.pl
          - ing.pl
          - www.ing.pl
          - santander.pl
          - www.santander.pl
          - pkobp.pl
          - www.pkobp.pl
          - ceneo.pl
          - www.ceneo.pl
          - empik.com
          - www.empik.com
          - x-kom.pl
          - www.x-kom.pl
    depends_on: [bank, gov, webmock]

networks:
  netpl:
    external: true
    name: netpl

volumes:
  eventbus_data:
